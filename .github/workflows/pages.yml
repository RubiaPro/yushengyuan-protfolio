name: Deploy portfolio to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Mirror artwork into the Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          media_origin="https://yushengyuan-portfolio.yurubia9.chatgpt.site"
          media_files=(
            hero-sky-v11.webp
            contact-rain-v11.webp
            inspiration/your-name-official.webp
            inspiration/weathering-with-you-official.webp
            inspiration/suzume-official.webp
          )
          for media_file in "${media_files[@]}"; do
            mkdir -p "$(dirname "$media_file")"
            curl --fail --location --retry 5 --retry-all-errors \
              "${media_origin}/${media_file}" \
              --output "${media_file}"
          done
          sed -i "s|${media_origin}/||g" index.html
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
